name: Build Nexagram (The Ultimate Master Build)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android App
      run: |
        cordova create app com.nexagram.app Nexagram
        cd app
        rm www/index.html
        cp ../index.html www/index.html
        
        # 1. ИКОНКА И CONFIG.XML (Сеть, StatusBar, Localhost)
        if [ -f "../icon.png" ]; then
          cp ../icon.png icon.png
          sed -i 's|<widget|<widget xmlns:android="http://schemas.android.com/apk/res/android"|' config.xml
          sed -i 's|</widget>|    <icon src="icon.png" />\n</widget>|' config.xml
        fi
        
        sed -i 's|</widget>|    <preference name="scheme" value="https" />\n    <preference name="hostname" value="localhost" />\n    <preference name="StatusBarOverlaysWebView" value="true" />\n    <preference name="StatusBarStyle" value="lightcontent" />\n    <access origin="*" />\n    <allow-navigation href="*" />\n    <allow-intent href="*" />\n</widget>|' config.xml
        
        # 2. ИНЪЕКЦИЯ ДЛЯ CLOUDINARY, ШТОРКИ И ПОДКЛЮЧЕНИЯ СКРИПТОВ
        # Вставляем мета-теги, CSS-фикс для часов и вызовы скриптов прямо в <head>
        cat > www/inject.txt << 'EOF'
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
        <meta http-equiv="Content-Security-Policy" content="default-src * data: blob: filesystem: about: ws: wss: 'unsafe-inline' 'unsafe-eval'; script-src * data: blob: 'unsafe-inline' 'unsafe-eval'; connect-src * data: blob: 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; media-src * data: blob: 'unsafe-inline';">
        <style> body, #root, .app-container { padding-top: env(safe-area-inset-top, 30px) !important; } </style>
        <script src="cordova.js"></script>
        <script src="init.js"></script>
        EOF
        sed -i '/<head>/r www/inject.txt' www/index.html
        
        # 3. ИНЪЕКЦИЯ INIT.JS (Перехват Firebase Auth, Права на железо, Уведомления)
        cat > www/init.js << 'EOF'
        document.addEventListener('deviceready', function() {
            // ЗАПРОС ПРАВ НА КАМЕРУ И МИКРОФОН
            var perms = cordova.plugins.permissions;
            perms.requestPermissions([perms.CAMERA, perms.RECORD_AUDIO, perms.MODIFY_AUDIO_SETTINGS, "android.permission.POST_NOTIFICATIONS"], function(){}, function(){});
            
            // ПЕРЕХВАТ УВЕДОМЛЕНИЙ
            window.Notification = function(title, options) {
                if(cordova.plugins && cordova.plugins.notification) {
                    cordova.plugins.notification.local.schedule({ title: title, text: options ? options.body : "" });
                }
            };
            window.Notification.permission = "granted";
            window.Notification.requestPermission = function() { return Promise.resolve("granted"); };
            
            // === МАГИЯ: ПЕРЕХВАТ FIREBASE GOOGLE AUTH ===
            // Ждем, пока твой код загрузит Firebase, и подменяем функцию входа
            let authInterval = setInterval(() => {
                if (window.firebase && firebase.auth) {
                    clearInterval(authInterval);
                    const originalSignIn = firebase.auth().signInWithPopup;
                    firebase.auth().signInWithPopup = function(provider) {
                        if (provider && provider.providerId === 'google.com') {
                            return new Promise((resolve, reject) => {
                                window.plugins.googleplus.login({
                                    'webClientId': '208335236412-jfqtscbj2pkj7mi6pn42e331aiqnira8.apps.googleusercontent.com',
                                    'offline': true
                                }, function (obj) {
                                    // Успешный нативный вход -> передаем токен обратно в твой Firebase
                                    const cred = firebase.auth.GoogleAuthProvider.credential(obj.idToken);
                                    firebase.auth().signInWithCredential(cred).then(resolve).catch(reject);
                                }, function (msg) {
                                    alert("Ошибка входа: " + msg);
                                    reject(msg);
                                });
                            });
                        }
                        return originalSignIn.apply(this, arguments);
                    };
                }
            }, 500);
        }, false);
        EOF
        
        # 4. ЖЕСТКИЙ ФИКС АНДРОИД МАНИФЕСТА (Для WebRTC)
        # Добавляем плагины
        cordova platform add android
        cordova plugin add cordova-plugin-android-permissions
        cordova plugin add cordova-plugin-media-capture
        cordova plugin add cordova-plugin-statusbar
        cordova plugin add cordova-plugin-local-notification-12
        
        # Нативный плагин Google Auth
        cordova plugin add cordova-plugin-googleplus --variable REVERSED_CLIENT_ID=com.googleusercontent.apps.208335236412-jfqtscbj2pkj7mi6pn42e331aiqnira8 --variable WEB_APPLICATION_CLIENT_ID=208335236412-jfqtscbj2pkj7mi6pn42e331aiqnira8.apps.googleusercontent.com
        
        sed -i '/<uses-permission/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-feature android:name="android.hardware.camera" android:required="true" />\n    <uses-feature android:name="android.hardware.microphone" android:required="true" />' platforms/android/app/src/main/AndroidManifest.xml
        
        # 5. КОМПИЛЯЦИЯ
        cordova build android --debug

    - name: Upload APK to download link
      uses: actions/upload-artifact@v4
      with:
        name: nexagram-apk
        path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
