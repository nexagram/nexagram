name: Build Nexagram (The Ultimate Master Build)

on: [push]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Handle Permanent Keystore
      run: |
        if [ ! -f "release.keystore" ]; then
          echo "Генерируем постоянный ключ..."
          keytool -genkeypair -v -keystore release.keystore -alias nexagram -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=nexagram, OU=app, O=nexagram, L=Moscow, S=Moscow, C=RU" -storepass 123456 -keypass 123456
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add release.keystore
          git commit -m "Save permanent keystore"
          git push
        else
          echo "Постоянный ключ найден! Используем его."
        fi
        echo "==================================================="
        echo "ТВОЙ ПОСТОЯННЫЙ SHA-1 КЛЮЧ ДЛЯ FIREBASE:"
        keytool -list -v -keystore release.keystore -alias nexagram -storepass 123456 -keypass 123456 | grep SHA1
        echo "==================================================="

    - name: Install Cordova
      run: npm install -g cordova

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android App
      run: |
        cordova create app com.nexagram.app Nexagram
        cp release.keystore app/release.keystore
        cd app
        rm www/index.html
        cp ../index.html www/index.html
        
        # 1. ИКОНКА И CONFIG.XML (Без наезда на часы)
        if [ -f "../icon.png" ]; then
          cp ../icon.png icon.png
          sed -i 's|<widget|<widget xmlns:android="http://schemas.android.com/apk/res/android"|' config.xml
          sed -i 's|</widget>|    <icon src="icon.png" />\n</widget>|' config.xml
        fi
        
        sed -i 's|</widget>|    <preference name="scheme" value="https" />\n    <preference name="hostname" value="localhost" />\n    <preference name="StatusBarOverlaysWebView" value="false" />\n    <preference name="StatusBarBackgroundColor" value="#050505" />\n    <preference name="StatusBarStyle" value="lightcontent" />\n    <preference name="WindowDrawsSystemBarBackgrounds" value="true" />\n    <access origin="*" />\n    <allow-navigation href="*" />\n    <allow-intent href="*" />\n</widget>|' config.xml
        
        # 2. ФИКС ШТОРКИ (Убираем viewport-fit=cover) И СЕТИ
        sed -i '/Content-Security-Policy/d' www/index.html
        sed -i '/viewport/d' www/index.html
        cat > www/inject.txt << 'EOF'
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
        <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob: file:; connect-src * 'unsafe-inline' 'unsafe-eval' data: blob: file: wss: ws:; img-src * data: blob: file: 'unsafe-inline'; media-src * data: blob: file: 'unsafe-inline';">
        <script src="cordova.js"></script>
        <script src="init.js"></script>
        EOF
        sed -i '/<head>/r www/inject.txt' www/index.html
        
        # 3. INIT.JS (Перехват Firebase Auth, Уведомления, Права, Принудительная шторка)
        cat > www/init.js << 'EOF'
        document.addEventListener('deviceready', function() {
            var perms = cordova.plugins.permissions;
            perms.requestPermissions([perms.CAMERA, perms.RECORD_AUDIO, perms.MODIFY_AUDIO_SETTINGS, "android.permission.POST_NOTIFICATIONS"], function(){}, function(){});
            
            if (window.StatusBar) {
                StatusBar.overlaysWebView(false);
                StatusBar.backgroundColorByHexString('#050505');
                StatusBar.styleLightContent();
            }
            
            window.Notification = function(title, options) {
                if(cordova.plugins && cordova.plugins.notification) { cordova.plugins.notification.local.schedule({ title: title, text: options ? options.body : "" }); }
            };
            window.Notification.permission = "granted"; window.Notification.requestPermission = function() { return Promise.resolve("granted"); };
            
            let authInterval = setInterval(() => {
                if (window.firebase && firebase.auth) {
                    clearInterval(authInterval);
                    const originalSignIn = firebase.auth().signInWithPopup;
                    firebase.auth().signInWithPopup = function(provider) {
                        if (provider && provider.providerId === 'google.com') {
                            return new Promise((resolve, reject) => {
                                window.plugins.googleplus.login({
                                    'webClientId': '208335236412-jfqtscbj2pkj7mi6pn42e331aiqnira8.apps.googleusercontent.com',
                                    'offline': true
                                }, function (obj) {
                                    const cred = firebase.auth.GoogleAuthProvider.credential(obj.idToken);
                                    firebase.auth().signInWithCredential(cred).then(resolve).catch(reject);
                                }, function (msg) { reject(msg); });
                            });
                        }
                        return originalSignIn.apply(this, arguments);
                    };
                }
            }, 500);
        }, false);
        EOF
        
        # 4. ПЛАГИНЫ И МАНИФЕСТ
        cordova platform add android
        cordova plugin add cordova-plugin-android-permissions
        cordova plugin add cordova-plugin-media-capture
        cordova plugin add cordova-plugin-statusbar
        cordova plugin add cordova-plugin-local-notification-12
        cordova plugin add cordova-plugin-googleplus --variable REVERSED_CLIENT_ID=com.googleusercontent.apps.208335236412-jfqtscbj2pkj7mi6pn42e331aiqnira8 --variable WEB_APPLICATION_CLIENT_ID=208335236412-jfqtscbj2pkj7mi6pn42e331aiqnira8.apps.googleusercontent.com
        
        sed -i 's|</manifest>|    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-feature android:name="android.hardware.camera" android:required="true" />\n    <uses-feature android:name="android.hardware.microphone" android:required="true" />\n</manifest>|' platforms/android/app/src/main/AndroidManifest.xml
        
        cat > build.json << 'EOF'
        { "android": { "debug": { "keystore": "release.keystore", "storePassword": "123456", "alias": "nexagram", "password" : "123456", "keystoreType": "" } } }
        EOF
        
        # 5. СБОРКА
        cordova build android --debug --buildConfig=build.json

    - name: Upload APK to download link
      uses: actions/upload-artifact@v4
      with:
        name: nexagram-apk
        path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
