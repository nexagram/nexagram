name: Build Nexagram (Nuclear Fix)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android App
      run: |
        cordova create app com.nexagram.app Nexagram
        # Подхватываем постоянный ключ, если он есть
        cp ../release.keystore app/release.keystore || true
        cd app
        
        # Закидываем твой код
        rm -rf www/*
        cp -r ../* www/ 2>/dev/null || true
        
        # 1. ПРЯМАЯ ИКОНКА (Без выпендрежа, чтобы 100% сработала)
        if [ -f "../icon.png" ]; then
          cp ../icon.png icon.png
          sed -i 's|</widget>|    <icon src="icon.png" />\n</widget>|' config.xml
        fi
        
        # 2. ЖЕСТКИЕ НАСТРОЙКИ СЕТИ И ШТОРКИ
        sed -i 's|</widget>|    <preference name="scheme" value="https" />\n    <preference name="hostname" value="localhost" />\n    <preference name="StatusBarOverlaysWebView" value="false" />\n    <preference name="StatusBarBackgroundColor" value="#000000" />\n    <preference name="StatusBarStyle" value="lightcontent" />\n    <access origin="*" />\n    <allow-intent href="*" />\n    <allow-navigation href="*" />\n</widget>|' config.xml
        
        # 3. УДАЛЕНИЕ ТВОИХ СТАРЫХ ОГРАНИЧЕНИЙ
        sed -i '/Content-Security-Policy/d' www/index.html
        sed -i '/viewport/d' www/index.html
        
        # 4. ЯДЕРНАЯ ИНЪЕКЦИЯ В КОНЕЦ ФАЙЛА (Сработает 100%)
        cat >> www/index.html << 'EOF'
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
        <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob: file:; connect-src * 'unsafe-inline' 'unsafe-eval' data: blob: file:; img-src * data: blob: file: 'unsafe-inline'; media-src * data: blob: file: 'unsafe-inline';">
        <style>
          /* Железобетонный отступ шторки от края экрана на 35px */
          html, body { margin-top: 35px !important; padding-top: 0 !important; }
        </style>
        <script src="cordova.js"></script>
        <script>
        document.addEventListener('deviceready', function() {
            // Права на камеру, микрофон и файлы (для Cloudinary)
            var perms = cordova.plugins.permissions;
            perms.requestPermissions([
                perms.CAMERA, 
                perms.RECORD_AUDIO, 
                perms.MODIFY_AUDIO_SETTINGS, 
                "android.permission.POST_NOTIFICATIONS",
                perms.READ_EXTERNAL_STORAGE,
                perms.WRITE_EXTERNAL_STORAGE
            ], function(){}, function(){});
            
            if (window.StatusBar) {
                StatusBar.overlaysWebView(false);
                StatusBar.backgroundColorByHexString('#000000');
                StatusBar.styleLightContent();
            }
            
            window.Notification = function(title, options) { 
                if(cordova.plugins && cordova.plugins.notification) { 
                    cordova.plugins.notification.local.schedule({ title: title, text: options ? options.body : "" }); 
                } 
            };
            window.Notification.permission = "granted"; 
            window.Notification.requestPermission = function() { return Promise.resolve("granted"); };
            
            if (window.cordova && window.cordova.InAppBrowser) { window.open = cordova.InAppBrowser.open; }
        }, false);
        </script>
        EOF
        
        # 5. ПЛАГИНЫ (Добавлен плагин работы с файлами для кружочков)
        cordova platform add android
        cordova plugin add cordova-plugin-android-permissions
        cordova plugin add cordova-plugin-media-capture
        cordova plugin add cordova-plugin-statusbar
        cordova plugin add cordova-plugin-local-notification-12
        cordova plugin add cordova-plugin-inappbrowser
        cordova plugin add cordova-plugin-file
        cordova plugin add cordova-plugin-file-transfer
        cordova plugin add cordova-plugin-androidx-adapter
        cordova plugin add cordova-plugin-googleplus --variable REVERSED_CLIENT_ID=com.googleusercontent.apps.208335236412-jfqtscbj2pkj7mi6pn42e331aiqnira8 --variable WEB_APPLICATION_CLIENT_ID=208335236412-jfqtscbj2pkj7mi6pn42e331aiqnira8.apps.googleusercontent.com
        
        sed -i 's|</manifest>|    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-feature android:name="android.hardware.camera" android:required="true" />\n    <uses-feature android:name="android.hardware.microphone" android:required="true" />\n</manifest>|' platforms/android/app/src/main/AndroidManifest.xml
        
        cat > build.json << 'EOF'
        { "android": { "debug": { "keystore": "release.keystore", "storePassword": "123456", "alias": "nexagram", "password" : "123456", "keystoreType": "" } } }
        EOF
        
        cordova build android --debug --buildConfig=build.json

    - name: Upload APK to download link
      uses: actions/upload-artifact@v4
      with:
        name: nexagram-apk
        path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
