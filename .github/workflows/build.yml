name: Build Nexagram APK (ULTIMATE FIX)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android App
      run: |
        cordova create app com.nexagram.app Nexagram
        cd app
        rm www/index.html
        cp ../index.html www/index.html
        
        # 1. ЧИНИМ ПРАВА И УВЕДОМЛЕНИЯ ПРЯМО В HTML (Магия седов)
        # А) Добавляем cordova.js и init.js
        sed -i 's|<head>|<head>\n    <script src="cordova.js"></script>\n    <script src="init.js"></script>|g' www/index.html
        
        # Б) СОЗДАЕМ init.js С ПРАВИЛЬНОЙ ЛОГИКОЙ
        # Этот код гарантированно запустится и перехватит браузерный window.Notification,
        # плюс запросит права при старте и отодвинет интерфейс от часов.
        cat > www/init.js << 'EOF'
        document.addEventListener('deviceready', function() {
            var permissions = cordova.plugins.permissions;
            permissions.requestPermissions([
              permissions.CAMERA,
              permissions.RECORD_AUDIO,
              "android.permission.POST_NOTIFICATIONS"
            ], function(status) { console.log('Permissions ok'); }, function() { console.error('Permissions failed'); });
            
            if (window.StatusBar) {
                StatusBar.overlaysWebView(false);
                StatusBar.backgroundColorByHexString('#000000');
                StatusBar.styleLightContent();
            }
            
            // ЖЕСТКИЙ ФИКС window.Notification
            // Мы подменяем браузерную функцию на нативный плагин.
            window.Notification = function(title, options) {
                if(cordova.plugins && cordova.plugins.notification) {
                    cordova.plugins.notification.local.schedule({
                        title: title,
                        text: options ? options.body : "",
                        foreground: true
                    });
                }
            };
            window.Notification.permission = "granted";
            window.Notification.requestPermission = function() { return Promise.resolve("granted"); };
        }, false);
        EOF
        
        # 2. CONFIG.XML FIX (Маскировка localhost, Фикс User Agent, Иконка и Статус бар)
        sed -i 's|</widget>|    <preference name="scheme" value="https" />\n    <preference name="hostname" value="localhost" />\n    <preference name="OverrideUserAgent" value="Mozilla/5.0 (Linux; Android 13; SM-S918B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" />\n    <preference name="StatusBarOverlaysWebView" value="false" />\n    <preference name="StatusBarBackgroundColor" value="#000000" />\n    <preference name="StatusBarStyle" value="lightcontent" />\n    <access origin="*" />\n    <allow-navigation href="*" />\n    <allow-intent href="*" />\n</widget>|' config.xml
        
        # Подхват иконки
        if [ -f "../icon.png" ]; then
          cp ../icon.png icon.png
          sed -i 's|<widget.*>|\0\n    <icon src="icon.png" />|' config.xml
        fi
        
        # 3. УСТАНАВЛИВАЕМ ПЛАГИНЫ
        cordova platform add android
        cordova plugin add cordova-plugin-android-permissions
        cordova plugin add cordova-plugin-media-capture
        cordova plugin add cordova-plugin-inappbrowser
        cordova plugin add cordova-plugin-statusbar
        cordova plugin add cordova-plugin-local-notification-12
        cordova plugin add cordova-plugin-androidx-adapter
        
        # 4. Сборка
        cordova build android --debug

    - name: Upload APK to download link
      uses: actions/upload-artifact@v4
      with:
        name: nexagram-apk
        path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
