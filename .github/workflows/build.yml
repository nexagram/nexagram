name: Build Nexagram APK (Hardcore Manifest Fix)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android App
      run: |
        cordova create app com.nexagram.app Nexagram
        cd app
        rm www/index.html
        cp ../index.html www/index.html
        
        # Подхват иконки
        if [ -f "../icon.png" ]; then
          cp ../icon.png icon.png
          sed -i 's|<widget|<widget xmlns:android="http://schemas.android.com/apk/res/android"|' config.xml
          sed -i 's|</widget>|    <icon src="icon.png" />\n</widget>|' config.xml
        fi
        
        # Вшиваем скрипт инициализации
        sed -i 's|<head>|<head>\n    <script src="cordova.js"></script>\n    <script src="init.js"></script>|g' www/index.html
        
        # init.js с расширенным запросом прав
        cat > www/init.js << 'EOF'
        document.addEventListener('deviceready', function() {
            var perms = cordova.plugins.permissions;
            perms.requestPermissions([
              perms.CAMERA,
              perms.RECORD_AUDIO,
              perms.MODIFY_AUDIO_SETTINGS,
              "android.permission.POST_NOTIFICATIONS"
            ], function(s){ console.log('Rights granted'); }, function(e){ console.error('Rights denied'); });
            
            if (window.StatusBar) {
                StatusBar.overlaysWebView(false);
                StatusBar.backgroundColorByHexString('#000000');
                StatusBar.styleLightContent();
            }
            
            window.Notification = function(title, options) {
                if(cordova.plugins && cordova.plugins.notification) {
                    cordova.plugins.notification.local.schedule({ title: title, text: options ? options.body : "" });
                }
            };
            window.Notification.permission = "granted";
            window.Notification.requestPermission = function() { return Promise.resolve("granted"); };
        }, false);
        EOF
        
        # Настройки WebView и маскировки
        sed -i 's|</widget>|    <preference name="scheme" value="https" />\n    <preference name="hostname" value="localhost" />\n    <preference name="OverrideUserAgent" value="Mozilla/5.0 (Linux; Android 13; SM-S918B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" />\n    <preference name="StatusBarOverlaysWebView" value="false" />\n    <preference name="StatusBarBackgroundColor" value="#000000" />\n    <preference name="StatusBarStyle" value="lightcontent" />\n    <access origin="*" />\n    <allow-navigation href="*" />\n    <allow-intent href="*" />\n</widget>|' config.xml
        
        # Устанавливаем платформу и плагины
        cordova platform add android
        cordova plugin add cordova-plugin-android-permissions
        cordova plugin add cordova-plugin-media-capture
        cordova plugin add cordova-plugin-inappbrowser
        cordova plugin add cordova-plugin-statusbar
        cordova plugin add cordova-plugin-local-notification-12
        
        # === ЖЕСТКИЙ ФИКС АНДРОИД МАНИФЕСТА (Взлом системы разрешений) ===
        sed -i '/<uses-permission/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-feature android:name="android.hardware.camera" android:required="true" />\n    <uses-feature android:name="android.hardware.microphone" android:required="true" />' platforms/android/app/src/main/AndroidManifest.xml
        
        # Собираем приложение
        cordova build android --debug

    - name: Upload APK to download link
      uses: actions/upload-artifact@v4
      with:
        name: nexagram-apk
        path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
