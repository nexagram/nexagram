name: Build Nexagram APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android App
      run: |
        cordova create app com.nexagram.app Nexagram
        cd app
        rm www/index.html
        cp ../index.html www/index.html
        
        # Подхват иконки (если загружена)
        if [ -f "../icon.png" ]; then
          cp ../icon.png icon.png
          sed -i 's|</widget>|    <icon src="icon.png" />\n</widget>|' config.xml
        fi
        
        # Фикс интерфейса: сдвигаем шапку чата из-под часов и делаем фон черным
        sed -i 's|</widget>|    <preference name="StatusBarOverlaysWebView" value="false" />\n    <preference name="StatusBarBackgroundColor" value="#000000" />\n    <preference name="StatusBarStyle" value="lightcontent" />\n</widget>|' config.xml
        
        # Настройка безопасного домена (localhost)
        sed -i 's|</widget>|    <preference name="scheme" value="https" />\n    <preference name="hostname" value="localhost" />\n    <access origin="*" />\n    <allow-navigation href="*" />\n    <allow-intent href="*" />\n</widget>|' config.xml
        
        # Инъекция: Запрашиваем права на пуши и перехватываем браузерные уведомления
        sed -i 's|</body>|<script src="cordova.js"></script><script>document.addEventListener("deviceready", function() { var perms = cordova.plugins.permissions; perms.requestPermissions([perms.CAMERA, perms.RECORD_AUDIO, "android.permission.POST_NOTIFICATIONS"], function(){}, function(){}); window.Notification = function(title, options) { if(cordova.plugins && cordova.plugins.notification) { cordova.plugins.notification.local.schedule({ title: title, text: options ? options.body : "", foreground: true }); } return this; }; window.Notification.permission = "granted"; window.Notification.requestPermission = function() { return Promise.resolve("granted"); }; }, false);</script></body>|' www/index.html
        
        cordova platform add android
        cordova plugin add cordova-plugin-androidx-adapter
        cordova plugin add cordova-plugin-android-permissions
        cordova plugin add cordova-plugin-media-capture
        cordova plugin add cordova-plugin-inappbrowser
        cordova plugin add cordova-plugin-statusbar
        cordova plugin add cordova-plugin-local-notification-12
        
        cordova build android --debug

    - name: Upload APK to download link
      uses: actions/upload-artifact@v4
      with:
        name: nexagram-apk
        path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
