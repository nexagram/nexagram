<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexagram – новая эра в общении</title>
    <style>
        :root {
            --primary-color: #30d158; /* Фирменный зеленый Nexagram */
            --text-main: #222222;
            --text-muted: #7a828e;
            --bg-color: #ffffff;
            --border-color: #e4e4e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ (Язык и Тема) --- */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 20px 5px;
            gap: 20px;
        }

        .lang-selector {
            display: flex;
            align-items: center;
            color: var(--primary-color);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }

        .lang-selector svg {
            fill: var(--primary-color);
            width: 16px;
            height: 16px;
            margin: 0 4px;
        }

        .theme-toggle svg {
            fill: var(--text-muted);
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        /* --- НАВИГАЦИЯ (Главная, FAQ...) --- */
        .nav-tabs {
            display: flex;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        .nav-tabs a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 500;
            padding: 15px 20px;
            position: relative;
        }

        .nav-tabs a.active {
            color: var(--primary-color);
        }

        .nav-tabs a.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--primary-color);
            border-radius: 3px 3px 0 0;
        }

        /* --- ГЛАВНЫЙ БЛОК --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .logo {
            width: 130px;
            height: 130px;
            background-color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .logo svg {
            width: 60px;
            height: 60px;
            fill: #ffffff;
            margin-right: 5px; /* Центровка самолетика */
        }

        h1 {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #000;
        }

        h2 {
            font-size: 22px;
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* --- БЛОК С ТЕЛЕФОНАМИ (ЗАГЛУШКА) --- */
        .mockup-container {
            width: 100%;
            max-width: 400px;
            height: 350px;
            background-color: #f4f4f5;
            border: 2px dashed #ccc;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            /* Сюда потом вставишь свою картинку: */
            /* background-image: url('твой-скриншот.png'); */
            /* background-size: contain; */
            /* background-position: center; */
            /* background-repeat: no-repeat; */
        }

        /* --- КНОПКА/ССЫЛКА ВНИЗУ --- */
        .action-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--primary-color);
            font-size: 20px;
            font-weight: 500;
            padding-bottom: 50px;
        }

        .action-link svg {
            width: 32px;
            height: 32px;
            fill: var(--primary-color);
            margin-right: 12px;
        }

        .action-link strong {
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="lang-selector">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            RU
            <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
        <div class="theme-toggle">
            <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4C12.92 3.04 12.46 3 12 3z"/></svg>
        </div>
    </div>

    <nav class="nav-tabs">
        <a href="#" class="active">Главная</a>
        <a href="#">FAQ</a>
        <a href="#">Приложения</a>
    </nav>

    <div class="hero">
        <div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </div>

        <h1>Nexagram</h1>
        <h2>Где рождается общение</h2>

        <div class="mockup-container">
            [Тут будет картинка твоего приложения]

        <a href="https://nexagram.site/web" class="action-link">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
            <span>Nexagram для <strong>Браузера</strong></span>
        </a>
    </div>

</body>
</html>
