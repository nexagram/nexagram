<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexagram</title>
    <style>
        :root {
            --bg-color: #1c1c1d; /* Глубокий темный фон в стиле TG */
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --btn-color: #30d158; /* Твой фирменный зеленый */
            --btn-hover: #2db84d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Красивый круглый логотип с градиентом */
        .logo-container {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #30d158, #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(48, 209, 88, 0.25);
            animation: float 3s ease-in-out infinite;
        }

        /* Иконка внутри логотипа (бумажный самолетик) */
        .logo-container svg {
            width: 50px;
            height: 50px;
            fill: white;
            margin-right: 4px; /* Легкая центровка иконки */
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 17px;
            color: var(--text-muted);
            max-width: 320px;
            line-height: 1.4;
            margin-bottom: 40px;
        }

        /* Кнопка в стиле Telegram */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--btn-color);
            color: #000;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 14px;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 300px;
        }

        .btn:hover {
            background-color: var(--btn-hover);
        }

        .btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        /* Легкая анимация парения для логотипа */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- SVG иконка -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
    </div>

    <h1>Nexagram</h1>
    <p>Где рождается общение. Добро пожаловать в быструю и безопасную веб-версию.</p>

    <!-- Тот самый редирект -->
    <a href="https://nexagram.site/web" class="btn">Открыть веб-версию</a>

</body>
</html>
