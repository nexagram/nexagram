<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Nexagram — где рождается общение</title>
    
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #000000; --card: #121212; --in: #1c1c1c; --brd: #262626;
            --txt: #ffffff; --mut: #8e8e8e; --p: #30d158; --red: #ff3b30; --online: #30d158;
        }
        [data-theme="light"] {
            --bg: #f8f9fa; --card: #ffffff; --in: #f1f3f5; --brd: #e0e0e0;
            --txt: #1a1a1a; --mut: #666666; --p: #30d158;
        }
        body { background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, Arial, sans-serif; }
        
        .auth-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #050505, #0a1a0f); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 320px; background: rgba(17,17,17,0.95); backdrop-filter: blur(10px); border-radius: 32px; padding: 30px 20px; border: 1px solid rgba(48,209,88,0.2); box-shadow: 0 0 40px rgba(48,209,88,0.1); }
        .auth-logo { text-align: center; margin-bottom: 24px; }
        .logo-text { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, var(--p), #4ade80); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -1px; }
        .auth-logo small { font-size: 13px; color: var(--mut); display: block; margin-top: 6px; }
        .auth-tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #1a1a1a; border-radius: 30px; padding: 4px; }
        .auth-tab { flex: 1; text-align: center; padding: 10px; border-radius: 26px; cursor: pointer; color: var(--mut); font-weight: 500; transition: all 0.2s; font-size: 14px; }
        .auth-tab.active { background: linear-gradient(135deg, var(--p), #4ade80); color: #000; font-weight: 600; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; color: var(--mut); font-size: 12px; }
        .input-group input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: #fff; font-size: 14px; transition: border 0.2s; outline: none; }
        .input-group input:focus { border-color: var(--p); }
        .auth-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--p), #4ade80); border: none; border-radius: 12px; color: #000; font-weight: 700; font-size: 15px; cursor: pointer; transition: transform 0.1s, opacity 0.1s; margin-top: 4px; }
        .auth-btn:active { transform: scale(0.96); opacity: 0.8; }
        .auth-switch { text-align: center; margin-top: 14px; font-size: 13px; color: var(--mut); cursor: pointer; }
        
        .social-login-container { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--brd); display: flex; flex-direction: column; gap: 12px; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.1s; border: none; }
        .social-btn:active { transform: scale(0.96); opacity: 0.8; }
        .social-btn.google { background: #fff; color: #000; }
        .social-icon { width: 18px; height: 18px; }

        #app { display: none; width: 100%; height: 100%; flex-direction: column; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--in); border-top: 4px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="auth-screen" id="authScreen">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-text">NEXAGRAM</div>
            <small>Где рождается общение</small>
        </div>
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Вход</div>
            <div class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Регистрация</div>
        </div>
        
        <div class="auth-form active" id="loginForm">
            <div class="input-group">
                <label>Логин или Email</label>
                <input type="text" id="loginUsername" placeholder="Email или логин">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="Введите пароль">
            </div>
            <button class="auth-btn" onclick="doLogin()">Войти →</button>
        </div>
        
        <div class="social-login-container">
            <button class="social-btn google" onclick="loginWithGoogle()">
                <svg class="social-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Продолжить с Google
            </button>
            <button class="social-btn" style="background: #ffcc00; color: #000; border: none;" onclick="loginWithYandex()">
                <svg class="social-icon" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#FC3F1D" d="M152.14 0c26.97 0 46.54 8.23 58.74 24.69 12.21 16.46 18.31 38.07 18.31 64.83 0 29.56-6.84 52.88-20.5 69.96-13.68 17.09-35.32 25.63-64.93 25.63h-16.7l-35.03 66.86c-4.43 8.44-11.45 12.67-21.05 12.67-5.54 0-10.35-1.69-14.43-5.07-4.08-3.38-6.11-7.6-6.11-12.67 0-3.38.74-6.33 2.22-8.87l35.85-67.7H77.16c-11.45 0-17.18-5.7-17.18-17.11V138c0-11.4 5.73-17.11 17.18-17.11h34.73V44.97c0-6.75-2.22-12.03-6.66-15.83-4.44-3.8-10.72-5.7-18.84-5.7-6.28 0-10.72.63-13.31 1.9-2.59 1.27-5.36 3.8-8.32 7.6-5.17 6.34-10.53 9.5-16.08 9.5-5.91 0-10.9-2.32-14.97-6.97C49.64 30.82 47.6 25.54 47.6 19.63c0-6.33 2.59-11.82 7.76-16.47C60.54 1.05 73.1 0 88.08 0h64.06zm-8.87 132.93v-86.1c0-11.82 5.54-17.73 16.63-17.73 9.24 0 15.89 3.59 19.96 10.77 4.07 7.18 6.1 17.3 6.1 30.4 0 14.77-2.03 26.17-6.1 34.19-4.07 8.02-10.53 12.03-19.4 12.03h-17.19z"/>
                </svg>
                Продолжить с Яндекс
            </button>
        </div>
    </div>
</div>

<div id="loader"><div class="spinner"></div></div>
<div id="app"></div>

<script>
    const YANDEX_CLIENT_ID = '786ed0ca85094cd194c6c28bc59745ce';
    
    function switchAuthTab(tab) { /* твоя логика табов */ }
    function loginWithYandex() {
        const redirectUri = window.location.origin + window.location.pathname; 
        window.location.href = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${YANDEX_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}`;
    }
    window.handleYandexInfo = function(data) { alert("Юзер: " + data.login); /* тут логика входа */ };
    function checkYandexRedirect() {
        const hash = window.location.hash;
        if (hash.includes('access_token=')) {
            const params = new URLSearchParams(hash.substring(1));
            const script = document.createElement('script');
            script.src = `https://login.yandex.ru/info?format=json&oauth_token=${params.get('access_token')}&callback=handleYandexInfo`;
            document.body.appendChild(script);
        }
    }
    window.addEventListener('load', checkYandexRedirect);
</script>
</body>
</html>
